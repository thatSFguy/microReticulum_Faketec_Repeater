; MCU: ESP32-S3
; SRAM: 512 KB
; PSRAM: 8 MB
; Flash: 16 MB
; External Flash Interface: N/A
; LoRa: Semtech SX1262
[env:lilygo-t-deck]
platform = espressif32
board = esp32-s3-devkitc-1
custom_variant = tdeck
board_build.filesystem = littlefs
; Flash / memory layout
board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216
board_build.partitions = default_16MB.csv
; Enable PSRAM + correct flash mode
board_build.flash_mode = qio
board_build.psram_type = opi
board_build.arduino.memory_type = qio_opi
build_flags =
	${env.build_flags}
	-DBOARD_MODEL=BOARD_TDECK
    -DBOARD_HAS_PSRAM=1
	-DARDUINO_USB_MODE=1
    -DCORE_DEBUG_LEVEL=1
    ; Enable UARDUINO_ USB_ CDC_ ON_ BOOT will start printing and wait for terminal access during startup
    -DARDUINO_USB_CDC_ON_BOOT=1
    ; Enable UARDUINO_USB_CDC_ON_BOOT will turn off printing and will not block when using the battery
    ; -UARDUINO_USB_CDC_ON_BOOT
    -DBOARD_HAS_PSRAM=1
	-DRNS_CONTAINER_ALLOCATOR=RNS_PSRAM_ALLOCATOR
    -DUSTORE_USE_POSIXFS=1
	-DURTN_PATH_TABLE_MAX_RECS=2000
	-DRNS_PATH_TABLE_SEGMENT_SIZE=98304 ; 96 KB
	-DRNS_PATH_TABLE_SEGMENT_COUNT=8
lib_deps =
	${env.lib_deps}
	XPowersLib@^0.2.1
	https://github.com/attermann/microStore.git
	https://github.com/attermann/microReticulum.git

