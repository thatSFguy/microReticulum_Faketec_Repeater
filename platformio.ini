; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
; Change source and include directories to root of project since RNode places them here
include_dir = .
src_dir = .

[env]
framework = arduino
monitor_speed = 115200
upload_speed = 460800
build_unflags =
	-std=gnu++11
	-fno-exceptions
build_flags =
	-std=gnu++17
	-fexceptions
	;-O3
	-O0
	-Wall
	;-Wextra
	-Wno-missing-field-initializers
	-Wno-format
	-I.
	; CBA Define following to disable DEBUG build
	;-DNDEBUG
	; CBA Define following to include RNS stack
	-DHAS_RNS
	-DRNS_USE_FS
	-DRNS_PERSIST_PATHS
	-DMSGPACK_USE_BOOST=OFF
	; CBA Define following to disable LFS asserts
	;-DLFS_NO_ASSERT
	; ???
	;-DLFS_YES_TRACE
	; ???
	;-DCORE_DEBUG_LEVEL=5
	; ??? NO
	;-DLOG_LOCAL_LEVEL=5
	;-DCONFIG_LOG_DEFAULT_LEVEL=5
lib_deps = 
	ArduinoJson@^7.4.2
	MsgPack@^0.4.2
	adafruit/Adafruit SSD1306@^2.5.9
	https://github.com/attermann/Crypto.git
	;https://github.com/attermann/microStore.git
	;https://github.com/attermann/microReticulum.git
; Exclude directories in root from sources
build_src_filter = +<*> -<variants/>
extra_scripts = pre:extra_script.py

[env:rnode-ng-20]
platform = espressif32
board = ttgo-lora32-v2
custom_variant = ng20
board_build.partitions = no_ota.csv
board_build.filesystem = littlefs
build_flags =
	${env.build_flags}
	-DBOARD_MODEL=BOARD_RNODE_NG_20
    -DUSTORE_USE_POSIXFS=1
	-DURTN_PATH_TABLE_MAX_RECS=500
	-DRNS_PATH_TABLE_SEGMENT_SIZE=24576 ; 24 KB
	-DRNS_PATH_TABLE_SEGMENT_COUNT=8
lib_deps =
	${env.lib_deps}
	XPowersLib@^0.2.1
	adafruit/Adafruit NeoPixel@^1.12.0
	https://github.com/attermann/microStore.git
	https://github.com/attermann/microReticulum.git

