; MCU: Nordic nRF52840 (32-bit ARM Cortex-M4, 64 MHz)
; SRAM: 256 KB
; PSRAM: N/A
; Flash: 1 MB internal
; External Flash Interface: N/A
; LoRa: Semtech SX1262 (Ebyte E22-900M30S module with external PA)
; Form factor: ProMicro-style
[env:Faketec]
platform = nordicnrf52
board = nrf52840_dk_adafruit
custom_variant = Faketec
board_build.partitions = no_ota.csv
board_build.filesystem = littlefs
monitor_speed = 115200
; Override the board's default J-Link upload path. Faketec is a
; Nice!Nano-style clone with the Adafruit nRF52 bootloader, so we
; push the .zip via adafruit-nrfutil over serial DFU instead.
upload_protocol = nrfutil
build_unflags =
    ${env.build_unflags}
    -fno-exceptions    ; Required for exception handling on nordicnrf52
    -fno-rtti          ; Required for exception handling on nordicnrf52
    --specs=nano.specs ; Required for exception handling on nordicnrf52
build_flags =
    ${env.build_flags}
    -fexceptions        ; Required for exception handling on nordicnrf52
    -frtti              ; Required for exception handling on nordicnrf52
    --specs=nosys.specs ; Required for exception handling on nordicnrf52
    -DBOARD_MODEL=BOARD_Faketec
    ; Radio module: Ebyte E22-900M30S (SX1262, TCXO, ext RF switch, 30 dBm via ext PA).
    ; SX1262 core driven at 22 dBm; external PA boosts to 30 dBm / 1 W at antenna.
    ; Alternative modules:
    ;-DNO_TCXO        ; for E22-900MM22S or E220-900M22S
    ;-DMAX_POWER=8    ; for E22-900M33S
    ;
    ; ---- Baked transport config ----
    ; BAKED_CONFIG bypasses rnodeconf provisioning entirely: the firmware skips
    ; the EEPROM lock/product/model/hash/checksum gate and boots straight into
    ; MODE_TNC with the radio parameters below. Change a value here, rebuild,
    ; OTA the .zip via nRF Connect -> done. Single source of truth.
    -DBAKED_CONFIG
    -DBAKED_FREQ=904375000     ; 904.375 MHz, in Hz
    -DBAKED_BW=250000          ; 250 kHz,     in Hz
    -DBAKED_SF=10              ; spreading factor 7..12  (match Reticulum interface config on other nodes)
    -DBAKED_CR=5               ; coding rate denominator 5..8 (4/5..4/8)
    -DBAKED_TXP=22             ; SX1262 core dBm; ext PA boosts to ~30 dBm at antenna
    ;
    ; Transport-node memory tuning. With BAKED_CONFIG, op_mode is forced
    ; to MODE_TNC at boot, which engages reticulum.transport_enabled(true).
    ; Note: nRF52840 has 256 KB SRAM total, much of which is consumed by
    ; the SoftDevice RAM reservation, FreeRTOS kernel, TinyUSB buffers,
    ; BSS, and task stacks. Keep the pool conservative — bumping this
    ; too high causes a silent hard fault before USB CDC enumerates.
    -DRNS_DEFAULT_ALLOCATOR=RNS_HEAP_POOL_ALLOCATOR
    -DRNS_HEAP_POOL_BUFFER_SIZE=65536             ; 64 KB (diagnostic; raise after confirming boot)
    -DUSTORE_USE_INTERNALFS
    -DURTN_PATH_TABLE_MAX_RECS=100
    -DRNS_PATH_TABLE_SEGMENT_SIZE=4096            ; 4 KB segments
    -DRNS_PATH_TABLE_SEGMENT_COUNT=4
lib_deps =
    ${env.lib_deps}
    https://github.com/attermann/microStore.git
    https://github.com/attermann/microReticulum.git
